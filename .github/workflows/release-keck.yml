name: Release Keck

on:
    workflow_dispatch:
        inputs:
            tag:
                description: "Release tag (e.g. v0.1.0)"
                required: true
                type: string
    push:
        tags:
            - "v*"

permissions:
    contents: write

env:
    CARGO_TERM_COLOR: always

jobs:
    build-linux:
        name: Build Linux x86_64
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v2
            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: x86_64-unknown-linux-musl

            - uses: Swatinem/rust-cache@v2

            - name: Install musl tools
              run: sudo apt-get update && sudo apt-get install -yq musl-tools musl-dev

            - name: Install pnpm dependencies
              run: pnpm i --frozen-lockfile --store=node_modules/.pnpm-store

            - name: Vendor Cargo dependencies
              run: cargo vendor > .cargo/config

            - name: Build keck (Linux x86_64 musl)
              run: cargo build --profile fast-release --package keck --target x86_64-unknown-linux-musl
              env:
                  CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: x86_64-linux-musl-gcc

            - name: Package artifact
              run: |
                  mkdir -p release
                  cp target/x86_64-unknown-linux-musl/fast-release/keck release/keck
                  chmod +x release/keck
                  cd release && tar czf ../keck-linux-x86_64.tar.gz keck

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: keck-linux-x86_64
                  path: keck-linux-x86_64.tar.gz

    build-windows:
        name: Build Windows x86_64
        runs-on: windows-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v2
            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: x86_64-pc-windows-msvc

            - uses: Swatinem/rust-cache@v2

            - name: Install pnpm dependencies
              run: pnpm i --frozen-lockfile --store=node_modules/.pnpm-store

            - name: Vendor Cargo dependencies
              shell: bash
              run: cargo vendor > .cargo/config

            - name: Build keck (Windows x86_64)
              run: cargo build --profile fast-release --package keck --target x86_64-pc-windows-msvc

            - name: Package artifact
              shell: bash
              run: |
                  mkdir -p release
                  cp target/x86_64-pc-windows-msvc/fast-release/keck.exe release/keck.exe
                  cd release && 7z a ../keck-windows-x86_64.zip keck.exe

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: keck-windows-x86_64
                  path: keck-windows-x86_64.zip

    release:
        name: Create GitHub Release
        needs: [build-linux, build-windows]
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Determine tag
              id: tag
              run: |
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                    echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
                  else
                    echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
                  fi

            - name: Download Linux artifact
              uses: actions/download-artifact@v4
              with:
                  name: keck-linux-x86_64

            - name: Download Windows artifact
              uses: actions/download-artifact@v4
              with:
                  name: keck-windows-x86_64

            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.tag.outputs.tag }}
                  name: Keck ${{ steps.tag.outputs.tag }}
                  draft: false
                  prerelease: false
                  generate_release_notes: true
                  files: |
                      keck-linux-x86_64.tar.gz
                      keck-windows-x86_64.zip
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
